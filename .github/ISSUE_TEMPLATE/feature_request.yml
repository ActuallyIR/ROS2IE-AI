name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      placeholder: "e.g. I often need to... but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Have you tried workarounds?

  - type: dropdown
    id: category
    attributes:
      label: Feature category
      options:
        - New ROS 2 tool
        - LLM provider support
        - CLI improvement
        - Web UI
        - Documentation
        - Performance
        - Other
