<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROS2 Agent - React Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #020812; --panel-bg: #0a0f18; --panel-border: #1a2332; --fg: #e5e7eb; }
    .light-mode { --bg: #f0f4f8; --panel-bg: #ffffff; --panel-border: #d1d5db; --fg: #1e293b; }
    body { background: var(--bg); color: var(--fg); font-family: Inter, system-ui, -apple-system, sans-serif; }
    .panel { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 10px; }
    /* ── Light mode element overrides ───────────────────────────── */
    .light-mode .bg-slate-800 { background-color: #e2e8f0 !important; }
    .light-mode .bg-slate-700 { background-color: #cbd5e1 !important; }
    .light-mode .hover\:bg-slate-700:hover { background-color: #cbd5e1 !important; }
    .light-mode .hover\:bg-slate-600:hover { background-color: #cbd5e1 !important; }
    .light-mode .border-slate-800 { border-color: #e2e8f0 !important; }
    .light-mode .border-slate-700 { border-color: #d1d5db !important; }
    .light-mode .text-gray-300 { color: #374151 !important; }
    .light-mode .text-gray-400 { color: #4b5563 !important; }
    .light-mode .text-gray-500 { color: #6b7280 !important; }
    .light-mode .text-gray-600 { color: #9ca3af !important; }
    .light-mode .text-cyan-300 { color: #0891b2 !important; }
    .light-mode .text-yellow-300 { color: #b45309 !important; }
    .light-mode .text-emerald-300 { color: #059669 !important; }
    .light-mode .bg-cyan-700 { background-color: #0891b2 !important; }
    .light-mode .hover\:bg-cyan-600:hover { background-color: #06b6d4 !important; }
    .light-mode .bg-cyan-800 { background-color: #0e7490 !important; }
    .light-mode .hover\:bg-cyan-700:hover { background-color: #0891b2 !important; }
    .light-mode .bg-cyan-900 { background-color: #cffafe !important; }
    .light-mode .text-cyan-100 { color: #0e7490 !important; }
    .light-mode .bg-red-900 { background-color: #fca5a5 !important; }
    .light-mode .hover\:bg-red-800:hover { background-color: #f87171 !important; }
    .light-mode [class~="bg-[#0d1117]"] { background-color: #f8fafc !important; }
    .light-mode [class~="bg-[#050b13]"] { background-color: #f1f5f9 !important; }
    .light-mode [class~="bg-slate-900/50"] { background-color: rgba(241,245,249,0.6) !important; }
    .light-mode [class~="bg-slate-900"] { background-color: #f1f5f9 !important; }
    .light-mode [class~="bg-sky-950/40"] { background-color: rgba(186,230,255,0.5) !important; }
    .light-mode [class~="border-sky-900"] { border-color: #7dd3fc !important; }
    .light-mode [class~="bg-emerald-950/30"] { background-color: rgba(167,243,208,0.4) !important; }
    .light-mode [class~="border-emerald-900"] { border-color: #6ee7b7 !important; }
    .light-mode [class~="bg-amber-950/80"] { background-color: rgba(255,251,235,0.95) !important; }
    .light-mode .border-amber-700 { border-color: #d97706 !important; }
    .light-mode .text-amber-200 { color: #92400e !important; }
    .light-mode [class~="bg-black/50"] { background-color: rgba(255,255,255,0.75) !important; color: #374151 !important; }
  </style>
</head>
<body class="h-screen overflow-hidden">
  <div id="root" class="h-full"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const QUICK_COMMANDS = [
      { name: "Drive Home", query: "navigate the robot to home position (1.5, 1.5)" },
      { name: "Go Center", query: "navigate the robot to centre (5, 5)" },
      { name: "Check Battery", query: "what is the battery level?" },
      { name: "List Topics", query: "what topics are active?" },
      { name: "List Nodes", query: "list all active ROS 2 nodes" },
      { name: "Diagnostics", query: "run ros2 doctor diagnostics" },
      { name: "List Services", query: "what services are available?" },
      { name: "Recent Errors", query: "show recent error messages" }
    ];

    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
    function parseHexColor(hex, fallback) {
      if (typeof hex !== "string") return fallback;
      const h = hex.trim();
      if (!/^#[0-9a-fA-F]{6}$/.test(h)) return fallback;
      return parseInt(h.slice(1), 16);
    }

    function App() {
      const [status, setStatus] = useState({ status: "loading", mock: true, provider: "-" });
      const [rosStatus, setRosStatus] = useState({ node_count: 0, topic_count: 0, battery_pct: 0 });
      const [topics, setTopics] = useState([]);
      const [nodes, setNodes] = useState([]);
      const [services, setServices] = useState([]);
      const [events, setEvents] = useState([]);
      const [message, setMessage] = useState("");
      const [streaming, setStreaming] = useState(false);
      const [messages, setMessages] = useState([
        { role: "agent", text: "Feature-complete React dashboard is ready. Ask me anything about your ROS 2 robot." }
      ]);

      const [lightMode, setLightMode] = useState(() => localStorage.getItem("ros2-theme") === "light");

      const [showInfo, setShowInfo] = useState(false);
      const [showEvents, setShowEvents] = useState(false);
      const [showPalette, setShowPalette] = useState(false);
      const [showHelp, setShowHelp] = useState(false);
      const [paletteQuery, setPaletteQuery] = useState("");
      const [paletteIndex, setPaletteIndex] = useState(0);

      const [sim, setSim] = useState(null);
      const [occupancy, setOccupancy] = useState(null);
      const [showGrid, setShowGrid] = useState(true);
      const [showScan, setShowScan] = useState(true);
      const [showPath, setShowPath] = useState(true);
      const [showOcc, setShowOcc] = useState(false);
      const [viewMode, setViewMode] = useState("3d");
      const [cameraMode, setCameraMode] = useState("overview");
      const [cameraStatus, setCameraStatus] = useState("");
      const [drive, setDrive] = useState({ vx: 0, omega: 0 });
      const [physicsUploadStatus, setPhysicsUploadStatus] = useState("");
      const [policyUploadStatus, setPolicyUploadStatus] = useState("");
      const [policyRunStatus, setPolicyRunStatus] = useState("");

      const sessionId = useMemo(() => "web-" + Math.random().toString(36).slice(2, 9), []);
      const lightModeRef = useRef(localStorage.getItem("ros2-theme") === "light");
      const scrollRef = useRef(null);
      const simCanvasRef = useRef(null);
      const threeMountRef = useRef(null);
      const threeCtxRef = useRef(null);
      const latestSimRef = useRef(null);
      const velCanvasRef = useRef(null);
      const wsRef = useRef(null);
      const driveTimerRef = useRef(null);
      const occupiedRefreshTick = useRef(0);

      const filteredCommands = QUICK_COMMANDS.filter((c) =>
        c.name.toLowerCase().includes(paletteQuery.toLowerCase())
      );

      useEffect(() => {
        const poll = async () => {
          try {
            const h = await fetch("/health").then((r) => r.json());
            const s = await fetch("/ros/status").then((r) => r.json());
            setStatus(h);
            setRosStatus(s);
          } catch {
            setStatus({ status: "offline", mock: true, provider: "unreachable" });
          }
        };
        poll();
        const t = setInterval(poll, 2500);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        wsRef.current = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws/sim");
        wsRef.current.onmessage = (evt) => {
          try { setSim(JSON.parse(evt.data)); } catch {}
        };
        return () => { if (wsRef.current) wsRef.current.close(); };
      }, []);

      useEffect(() => {
        if (!scrollRef.current) return;
        scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages, streaming]);

      useEffect(() => {
        latestSimRef.current = sim;
      }, [sim]);

      useEffect(() => {
        lightModeRef.current = lightMode;
      }, [lightMode]);

      useEffect(() => {
        localStorage.setItem("ros2-theme", lightMode ? "light" : "dark");
        const ctx = threeCtxRef.current;
        if (ctx && window.THREE) {
          const THREE = window.THREE;
          ctx.scene.background = new THREE.Color(lightMode ? 0xe8f0f7 : 0x060c14);
          ctx.scene.fog = lightMode ? null : new THREE.Fog(0x060c14, 8, 25);
        }
      }, [lightMode]);

      useEffect(() => {
        if (!showInfo) return;
        const load = async () => {
          try {
            const [t, n, s] = await Promise.all([
              fetch("/ros/topics").then((r) => r.json()),
              fetch("/ros/nodes").then((r) => r.json()),
              fetch("/ros/services").then((r) => r.json())
            ]);
            setTopics(t.topics || []);
            setNodes(n.nodes || []);
            setServices(s.services || []);
          } catch {}
        };
        load();
      }, [showInfo]);

      useEffect(() => {
        if (!showEvents) return;
        const load = async () => {
          try {
            const d = await fetch("/sim/events?limit=60").then((r) => r.json());
            setEvents(d.events || []);
          } catch {}
        };
        load();
        const t = setInterval(load, 2000);
        return () => clearInterval(t);
      }, [showEvents]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.ctrlKey && e.key.toLowerCase() === "k") { e.preventDefault(); setShowPalette(true); return; }
          if (e.ctrlKey && e.key.toLowerCase() === "i") { e.preventDefault(); setShowInfo((v) => !v); return; }
          if (e.ctrlKey && e.key.toLowerCase() === "l") { e.preventDefault(); setShowEvents((v) => !v); return; }
          if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") { e.preventDefault(); clearChat(); return; }
          if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "r") { e.preventDefault(); resetSim(); return; }
          if (e.key === "?") { setShowHelp((v) => !v); return; }
          if (e.key === "Escape") { setShowPalette(false); setShowHelp(false); return; }
          if (document.activeElement && document.activeElement.tagName === "INPUT") return;

          const driveMap = {
            w: [0.45, 0], a: [0, 1.4], s: [-0.45, 0], d: [0, -1.4],
            ArrowUp: [0.45, 0], ArrowLeft: [0, 1.4], ArrowDown: [-0.45, 0], ArrowRight: [0, -1.4], " ": [0, 0]
          };
          const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
          if (driveMap[key]) {
            const [vx, omega] = driveMap[key];
            if (vx === 0 && omega === 0) endDrive(); else beginDrive(vx, omega);
          }
        };
        const onUp = (e) => {
          const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
          if (["w", "a", "s", "d", "ArrowUp", "ArrowLeft", "ArrowDown", "ArrowRight"].includes(key)) endDrive();
        };
        window.addEventListener("keydown", onKey);
        window.addEventListener("keyup", onUp);
        return () => {
          window.removeEventListener("keydown", onKey);
          window.removeEventListener("keyup", onUp);
        };
      }, []);

      useEffect(() => {
        const c = simCanvasRef.current;
        if (!c || !sim) return;
        const ctx = c.getContext("2d");
        const W = c.width;
        const H = c.height;
        const M = sim.map_size || 10;
        const scale = W / M;
        const w2c = (x, y) => [x * scale, H - y * scale];

        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = lightMode ? "#f8fafc" : "#050b13";
        ctx.fillRect(0, 0, W, H);

        if (showGrid) {
          for (let i = 1; i < M; i++) {
            const [px] = w2c(i, 0);
            const [, py] = w2c(0, i);
            ctx.strokeStyle = lightMode ? "rgba(0,0,0,0.08)" : "rgba(255,255,255,0.06)";
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
          }
        }

        if (showOcc && occupancy) {
          const res = occupancy.length || 0;
          if (res > 0) {
            const gs = W / res;
            for (let gy = 0; gy < res; gy++) {
              for (let gx = 0; gx < res; gx++) {
                const v = occupancy[gy][gx];
                if (v > 0.05) {
                  ctx.fillStyle = `rgba(34,211,238,${clamp(v * 0.7, 0.05, 0.7)})`;
                  ctx.fillRect(gx * gs, H - (gy + 1) * gs, gs, gs);
                }
              }
            }
          }
        }

        (sim.obstacles || []).forEach(([ox, oy, ow, oh]) => {
          const [x, y] = w2c(ox, oy + oh);
          ctx.fillStyle = lightMode ? "#94a3b8" : "#1f2f47";
          ctx.fillRect(x, y, ow * scale, oh * scale);
        });

        if (showPath && sim.full_path && sim.full_path.length > 1) {
          ctx.strokeStyle = "rgba(34,211,238,0.28)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          sim.full_path.forEach((p, i) => {
            const [x, y] = w2c(p[0], p[1]);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          });
          ctx.stroke();
        }

        if (showPath && sim.path && sim.path.length > 1) {
          ctx.strokeStyle = "rgba(34,211,238,0.85)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          sim.path.forEach((p, i) => {
            const [x, y] = w2c(p[0], p[1]);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          });
          ctx.stroke();
        }

        if (showScan && sim.lidar && sim.lidar.length) {
          const n = sim.lidar.length;
          for (let i = 0; i < n; i += 2) {
            const r = sim.lidar[i];
            const ang = sim.theta + (2 * Math.PI * i / n);
            const [hx, hy] = w2c(sim.x + Math.cos(ang) * r, sim.y + Math.sin(ang) * r);
            ctx.fillStyle = "rgba(34,211,238,0.5)";
            ctx.beginPath();
            ctx.arc(hx, hy, 1.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        if (sim.waypoints && sim.waypoints.length) {
          for (let i = 0; i < sim.waypoints.length; i++) {
            const [wx, wy] = sim.waypoints[i];
            const [x, y] = w2c(wx, wy);
            ctx.strokeStyle = i < sim.waypoint_index ? "rgba(34,197,94,0.8)" : "rgba(249,115,22,0.8)";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x - 4, y - 4); ctx.lineTo(x + 4, y + 4); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + 4, y - 4); ctx.lineTo(x - 4, y + 4); ctx.stroke();
          }
        }

        if (sim.goal_x !== null && sim.goal_y !== null) {
          const [gx, gy] = w2c(sim.goal_x, sim.goal_y);
          ctx.strokeStyle = "#f97316";
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(gx, gy, 9, 0, Math.PI * 2); ctx.stroke();
        }

        const [rx, ry] = w2c(sim.x, sim.y);
        ctx.save();
        ctx.translate(rx, ry);
        ctx.rotate(-sim.theta);
        ctx.fillStyle = "#38bdf8";
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#bae6fd";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(12, 0); ctx.stroke();
        ctx.restore();
      }, [sim, occupancy, showGrid, showScan, showPath, showOcc, lightMode]);

      useEffect(() => {
        if (viewMode !== "3d") return () => {};
        let initTimer = 0;
        let raf = 0;
        let renderer = null;
        let teardown = null;
        let initAttempts = 0;

        const host = threeMountRef.current;
        if (!host) return () => {};

        const initThree = () => {
          if (!threeMountRef.current) return false;
          if (!window.THREE) return false;

          const THREE = window.THREE;
          const host = threeMountRef.current;
          host.innerHTML = "";
          const w = host.clientWidth || 468;
          const h = host.clientHeight || 468;

          try {
            renderer = new THREE.WebGLRenderer({ antialias: true });
          } catch (err) {
            setCameraStatus("3D camera unavailable (WebGL init failed). Switched to 2D map.");
            setViewMode("2d");
            return true;
          }

          renderer.setSize(w, h);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
          renderer.shadowMap.enabled = true;
          renderer.shadowMap.type = THREE.PCFSoftShadowMap;
          renderer.toneMapping = THREE.ACESFilmicToneMapping;
          renderer.toneMappingExposure = 1.05;
          host.appendChild(renderer.domElement);

          const scene = new THREE.Scene();
          scene.background = new THREE.Color(lightModeRef.current ? 0xe8f0f7 : 0x060c14);
          scene.fog = lightModeRef.current ? null : new THREE.Fog(0x060c14, 8, 25);

          const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
          camera.position.set(7.8, 7.0, 8.8);
          camera.lookAt(5, 0, 5);

          const hemi = new THREE.HemisphereLight(0xc8ddff, 0x0a1220, 0.62);
          scene.add(hemi);

          const sun = new THREE.DirectionalLight(0xffffff, 1.25);
          sun.position.set(8, 12, 6);
          sun.castShadow = true;
          sun.shadow.mapSize.set(1024, 1024);
          sun.shadow.camera.near = 1;
          sun.shadow.camera.far = 35;
          sun.shadow.camera.left = -12;
          sun.shadow.camera.right = 12;
          sun.shadow.camera.top = 12;
          sun.shadow.camera.bottom = -12;
          scene.add(sun);

          const rim = new THREE.PointLight(0x7cc7ff, 0.4, 18, 2.0);
          rim.position.set(2, 3, 8.5);
          scene.add(rim);

          const checkerTexCanvas = document.createElement("canvas");
          checkerTexCanvas.width = 512;
          checkerTexCanvas.height = 512;
          const checkerCtx = checkerTexCanvas.getContext("2d");
          for (let y = 0; y < 16; y++) {
            for (let x = 0; x < 16; x++) {
              checkerCtx.fillStyle = (x + y) % 2 === 0 ? "#2a2f35" : "#23282e";
              checkerCtx.fillRect(x * 32, y * 32, 32, 32);
            }
          }
          const checkerTex = new THREE.CanvasTexture(checkerTexCanvas);
          checkerTex.wrapS = THREE.RepeatWrapping;
          checkerTex.wrapT = THREE.RepeatWrapping;
          checkerTex.repeat.set(3.2, 3.2);
          checkerTex.anisotropy = 8;

          const floorMat = new THREE.MeshStandardMaterial({
            color: 0x2a3037, roughness: 0.78, metalness: 0.15, map: checkerTex
          });
          const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMat);
          floor.rotation.x = -Math.PI / 2;
          floor.receiveShadow = true;
          scene.add(floor);

          const grid = new THREE.GridHelper(10, 20, 0x425a74, 0x273545);
          grid.position.y = 0.001;
          grid.material.opacity = 0.45;
          grid.material.transparent = true;
          scene.add(grid);

          const walls = new THREE.Group();
          const wallMat = new THREE.MeshStandardMaterial({ color: 0x2f3d4e, roughness: 0.78, metalness: 0.12 });
          const wallGeomH = new THREE.BoxGeometry(10, 0.55, 0.15);
          const wallGeomV = new THREE.BoxGeometry(0.15, 0.55, 10);
          [
            [5, 0.27, 0.03, wallGeomH],
            [5, 0.27, 9.97, wallGeomH],
            [0.03, 0.27, 5, wallGeomV],
            [9.97, 0.27, 5, wallGeomV]
          ].forEach(([x, y, z, g]) => {
            const m = new THREE.Mesh(g, wallMat);
            m.position.set(x, y, z);
            m.castShadow = true;
            m.receiveShadow = true;
            walls.add(m);
          });
          scene.add(walls);

          const obstacles = new THREE.Group();
          const obstacleMat = new THREE.MeshStandardMaterial({
            color: 0x4f637b, roughness: 0.65, metalness: 0.25
          });
          scene.add(obstacles);

          const robot = new THREE.Group();
          const chassis = new THREE.Mesh(
            new THREE.BoxGeometry(0.42, 0.16, 0.34),
            new THREE.MeshStandardMaterial({ color: 0x87a9c9, roughness: 0.35, metalness: 0.35 })
          );
          chassis.position.y = 0.18;
          chassis.castShadow = true;
          chassis.receiveShadow = true;
          robot.add(chassis);

          const top = new THREE.Mesh(
            new THREE.CylinderGeometry(0.11, 0.11, 0.08, 24),
            new THREE.MeshStandardMaterial({ color: 0x3e5f85, roughness: 0.45, metalness: 0.25 })
          );
          top.position.y = 0.30;
          top.castShadow = true;
          robot.add(top);

          const sensor = new THREE.Mesh(
            new THREE.SphereGeometry(0.035, 20, 20),
            new THREE.MeshStandardMaterial({ color: 0xb8ebff, emissive: 0x7fd4ff, emissiveIntensity: 0.45, roughness: 0.2, metalness: 0.1 })
          );
          sensor.position.set(0.16, 0.23, 0.0);
          robot.add(sensor);

          const wheelMat = new THREE.MeshStandardMaterial({ color: 0x151b24, roughness: 0.88, metalness: 0.15 });
          const wheelGeom = new THREE.CylinderGeometry(0.07, 0.07, 0.035, 20);
          const wheelL = new THREE.Mesh(wheelGeom, wheelMat);
          wheelL.rotation.z = Math.PI / 2;
          wheelL.position.set(0.0, 0.08, -0.16);
          wheelL.castShadow = true;
          robot.add(wheelL);
          const wheelR = wheelL.clone();
          wheelR.position.z = 0.16;
          robot.add(wheelR);

          const antenna = new THREE.Mesh(
            new THREE.CylinderGeometry(0.008, 0.008, 0.11, 10),
            new THREE.MeshStandardMaterial({ color: 0xdde8f7, roughness: 0.22, metalness: 0.75 })
          );
          antenna.position.set(-0.12, 0.38, 0.0);
          robot.add(antenna);

          const bumper = new THREE.Mesh(
            new THREE.TorusGeometry(0.20, 0.01, 12, 36),
            new THREE.MeshStandardMaterial({ color: 0x101826, roughness: 0.85, metalness: 0.1 })
          );
          bumper.rotation.x = Math.PI / 2;
          bumper.position.y = 0.1;
          robot.add(bumper);

          const contactShadow = new THREE.Mesh(
            new THREE.CircleGeometry(0.28, 36),
            new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 })
          );
          contactShadow.rotation.x = -Math.PI / 2;
          contactShadow.position.y = 0.005;
          robot.add(contactShadow);
          robot.userData.wheels = [wheelL, wheelR];
          scene.add(robot);

          const goal = new THREE.Mesh(
            new THREE.TorusGeometry(0.13, 0.015, 12, 30),
            new THREE.MeshStandardMaterial({ color: 0xf59e0b, emissive: 0x7a3b05, emissiveIntensity: 0.35 })
          );
          goal.rotation.x = -Math.PI / 2;
          goal.position.set(5, 0.03, 5);
          goal.visible = false;
          scene.add(goal);

          const pathLine = new THREE.Line(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: 0x33d9ff, transparent: true, opacity: 0.75 })
          );
          scene.add(pathLine);

          const profileProxy = new THREE.Group();
          profileProxy.position.set(8.5, 0, 1.4);
          scene.add(profileProxy);

          let camYaw = 0.74;
          let camPitch = 0.92;
          let camDist = 12.6;
          let dragging = false;
          let lastMX = 0;
          let lastMY = 0;
          const mapCenter = new THREE.Vector3(5, 0.25, 5);
          const camTarget = new THREE.Vector3(5, 0.25, 5);
          const camGoal = new THREE.Vector3(5, 0.25, 5);

          const onPointerDown = (e) => {
            dragging = true;
            lastMX = e.clientX;
            lastMY = e.clientY;
          };
          const onPointerMove = (e) => {
            if (!dragging) return;
            const dx = e.clientX - lastMX;
            const dy = e.clientY - lastMY;
            lastMX = e.clientX;
            lastMY = e.clientY;
            camYaw -= dx * 0.005;
            camPitch = Math.max(0.15, Math.min(1.2, camPitch - dy * 0.005));
          };
          const onPointerUp = () => {
            dragging = false;
          };
          const onWheel = (e) => {
            e.preventDefault();
            camDist = Math.max(9.5, Math.min(18.0, camDist + e.deltaY * 0.01));
          };

          host.addEventListener("pointerdown", onPointerDown);
          host.addEventListener("pointermove", onPointerMove);
          window.addEventListener("pointerup", onPointerUp);
          host.addEventListener("wheel", onWheel, { passive: false });

          const resetCamera = () => {
            camYaw = 0.74;
            camPitch = 0.92;
            camDist = 12.6;
            camGoal.set(5, 0.25, 5);
            camTarget.set(5, 0.25, 5);
          };
          host.addEventListener("dblclick", resetCamera);

          const onResize = () => {
            const nw = host.clientWidth || 468;
            const nh = host.clientHeight || 468;
            renderer.setSize(nw, nh);
            camera.aspect = nw / nh;
            camera.updateProjectionMatrix();
          };
          window.addEventListener("resize", onResize);

          const tick = () => {
            raf = requestAnimationFrame(tick);
            const live = latestSimRef.current;
            if (live && cameraMode === "follow") {
              camGoal.set(
                0.55 * mapCenter.x + 0.45 * live.x,
                0.24,
                0.55 * mapCenter.z + 0.45 * live.y
              );
              camGoal.x = Math.max(2.8, Math.min(7.2, camGoal.x));
              camGoal.z = Math.max(2.8, Math.min(7.2, camGoal.z));
            } else {
              camGoal.copy(mapCenter);
            }
            camTarget.lerp(camGoal, 0.06);
            const px = camTarget.x + Math.cos(camYaw) * Math.cos(camPitch) * camDist;
            const py = camTarget.y + Math.sin(camPitch) * camDist + 0.2;
            const pz = camTarget.z + Math.sin(camYaw) * Math.cos(camPitch) * camDist;
            camera.position.set(px, py, pz);
            camera.lookAt(camTarget);
            renderer.render(scene, camera);
          };
          tick();

          setCameraStatus("");
          threeCtxRef.current = {
            renderer, scene, camera, robot, obstacles, goal, pathLine,
            profileProxy, profileSignature: "", styledProfileName: ""
          };

          teardown = () => {
            cancelAnimationFrame(raf);
            host.removeEventListener("pointerdown", onPointerDown);
            host.removeEventListener("pointermove", onPointerMove);
            window.removeEventListener("pointerup", onPointerUp);
            host.removeEventListener("wheel", onWheel);
            host.removeEventListener("dblclick", resetCamera);
            window.removeEventListener("resize", onResize);
            renderer.dispose();
            host.innerHTML = "";
            threeCtxRef.current = null;
          };

          return true;
        };

        if (!initThree()) {
          initAttempts = 1;
          setCameraStatus("Starting 3D camera...");
          initTimer = setInterval(() => {
            if (initThree()) {
              clearInterval(initTimer);
              return;
            }
            initAttempts += 1;
            if (initAttempts >= 20) {
              clearInterval(initTimer);
              setCameraStatus("3D camera script could not load. Switched to 2D map.");
              setViewMode("2d");
            }
          }, 250);
        }

        return () => {
          if (initTimer) clearInterval(initTimer);
          if (teardown) teardown();
        };
      }, [cameraMode, viewMode]);

      useEffect(() => {
        const ctx = threeCtxRef.current;
        if (!ctx || !sim) return;
        const THREE = window.THREE;
        const profile = sim.robot_profile || null;

        ctx.robot.position.set(sim.x, 0.0, sim.y);
        ctx.robot.rotation.y = -sim.theta;

        const wheels = ctx.robot.userData.wheels || [];
        wheels.forEach((w) => { w.rotation.x -= sim.vx * 0.25; });

        ctx.goal.visible = sim.goal_x !== null && sim.goal_y !== null;
        if (ctx.goal.visible) {
          ctx.goal.position.set(sim.goal_x, 0.03, sim.goal_y);
        }

        const obs = sim.obstacles || [];
        if (ctx.obstacles.children.length !== obs.length) {
          ctx.obstacles.clear();
          const mat = new THREE.MeshStandardMaterial({ color: 0x4f637b, roughness: 0.65, metalness: 0.25 });
          obs.forEach(([ox, oy, ow, oh]) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(ow, 0.45, oh), mat);
            m.position.set(ox + ow / 2, 0.225, oy + oh / 2);
            m.castShadow = true;
            m.receiveShadow = true;
            ctx.obstacles.add(m);
          });
        }

        if (showPath && sim.path && sim.path.length > 1) {
          const pts = sim.path.map((p) => new THREE.Vector3(p[0], 0.03, p[1]));
          ctx.pathLine.geometry.dispose();
          ctx.pathLine.geometry = new THREE.BufferGeometry().setFromPoints(pts);
          ctx.pathLine.visible = true;
        } else {
          ctx.pathLine.visible = false;
        }

        if (profile && profile.loaded) {
          if (ctx.profileSignature !== profile.signature) {
            ctx.profileSignature = profile.signature || "";
            ctx.profileProxy.clear();
            const primitives = (profile.collision && profile.collision.primitives) || [];
            const matCfg = ((profile.visual || {}).materials || {}).joint || {};
            const proxyColor = parseHexColor(matCfg.base_color, 0x6aa7d3);
            const proxyMat = new THREE.MeshStandardMaterial({
              color: proxyColor,
              roughness: typeof matCfg.roughness === "number" ? clamp(matCfg.roughness, 0, 1) : 0.45,
              metalness: typeof matCfg.metalness === "number" ? clamp(matCfg.metalness, 0, 1) : 0.2
            });

            let yCursor = 0.06;
            let added = 0;
            for (const p of primitives) {
              if (!p || typeof p !== "object") continue;
              let mesh = null;
              const t = typeof p.type === "string" ? p.type.toLowerCase() : "";
              if (t === "box" && Array.isArray(p.size) && p.size.length >= 3) {
                const sx = Math.max(0.04, Number(p.size[0]) || 0.2);
                const sz = Math.max(0.04, Number(p.size[1]) || 0.2);
                const sy = Math.max(0.04, Number(p.size[2]) || 0.2);
                mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), proxyMat);
                mesh.position.y = yCursor + sy * 0.5;
                yCursor += sy + 0.03;
              } else if (t === "capsule") {
                const radius = Math.max(0.03, Number(p.radius) || 0.08);
                const length = Math.max(0.05, Number(p.length) || 0.25);
                if (THREE.CapsuleGeometry) {
                  mesh = new THREE.Mesh(new THREE.CapsuleGeometry(radius, length, 6, 12), proxyMat);
                } else {
                  mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, length, 16), proxyMat);
                }
                mesh.position.y = yCursor + radius + length * 0.5;
                yCursor += (radius * 2 + length) + 0.03;
              }
              if (mesh) {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                ctx.profileProxy.add(mesh);
                added += 1;
              }
            }

            if (added === 0) {
              const fallback = new THREE.Mesh(
                new THREE.CylinderGeometry(0.14, 0.16, 0.55, 18),
                proxyMat
              );
              fallback.position.y = 0.28;
              fallback.castShadow = true;
              fallback.receiveShadow = true;
              ctx.profileProxy.add(fallback);
            }
          }

          if (ctx.styledProfileName !== profile.name) {
            ctx.styledProfileName = profile.name || "";
            const mats = ((profile.visual || {}).materials || {});
            const chassisCfg = mats.chassis || {};
            const jointCfg = mats.joint || {};
            const rubberCfg = mats.rubber || {};

            const chassisColor = parseHexColor(chassisCfg.base_color, 0x87a9c9);
            const topColor = parseHexColor(jointCfg.base_color, 0x3e5f85);
            const wheelColor = parseHexColor(rubberCfg.base_color, 0x151b24);

            const [chassis, top, sensor, wheelL, wheelR] = ctx.robot.children;
            if (chassis && chassis.material) chassis.material.color.setHex(chassisColor);
            if (top && top.material) top.material.color.setHex(topColor);
            if (wheelL && wheelL.material) wheelL.material.color.setHex(wheelColor);
            if (wheelR && wheelR.material) wheelR.material.color.setHex(wheelColor);
            if (sensor && sensor.material && sensor.material.emissive) {
              sensor.material.emissiveIntensity = 0.5;
            }
          }
        }
      }, [sim, showPath]);

      useEffect(() => {
        const c = velCanvasRef.current;
        if (!c) return;
        const ctx = c.getContext("2d");
        const w = c.width;
        const h = c.height;
        ctx.fillStyle = lightMode ? "#f8fafc" : "#050b13";
        ctx.fillRect(0, 0, w, h);
        const data = (sim && sim.velocity_history) || [];
        if (data.length < 2) {
          ctx.fillStyle = lightMode ? "#64748b" : "#4b5563";
          ctx.font = "11px monospace";
          ctx.fillText("No velocity samples yet", 8, 24);
          return;
        }
        const maxV = 0.55;
        ctx.strokeStyle = "rgba(34,211,238,0.9)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const x = (i / (data.length - 1)) * w;
          const y = h - clamp(data[i], 0, maxV) / maxV * h;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }, [sim, lightMode]);

      useEffect(() => {
        if (!showOcc) return;
        const load = async () => {
          try {
            const d = await fetch("/sim/occupancy?res=24").then((r) => r.json());
            setOccupancy(d.grid || null);
          } catch {}
        };
        load();
      }, [showOcc]);

      useEffect(() => {
        if (!showOcc || !sim) return;
        occupiedRefreshTick.current += 1;
        if (occupiedRefreshTick.current % 15 !== 0) return;
        fetch("/sim/occupancy?res=24")
          .then((r) => r.json())
          .then((d) => setOccupancy(d.grid || null))
          .catch(() => {});
      }, [sim, showOcc]);

      function clearChat() {
        setMessages([{ role: "agent", text: "Chat cleared." }]);
      }

      async function resetSim() {
        await fetch("/sim/reset", { method: "POST" });
      }

      async function sendPatrol() {
        const waypoints = [[1.5, 1.5], [5.0, 1.5], [8.5, 1.5], [8.5, 5.0], [8.5, 8.5], [5.0, 8.5], [1.5, 8.5], [1.5, 5.0]];
        await fetch("/sim/waypoints", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ waypoints })
        });
      }

      async function sendGoal(gx, gy) {
        await fetch(`/sim/goal?x=${gx.toFixed(3)}&y=${gy.toFixed(3)}`, { method: "POST" });
      }

      async function sendDrive(vx, omega) {
        await fetch(`/sim/cmd_vel?vx=${vx}&omega=${omega}`, { method: "POST" });
      }

      function beginDrive(vx, omega) {
        setDrive({ vx, omega });
        if (driveTimerRef.current) clearInterval(driveTimerRef.current);
        sendDrive(vx, omega);
        driveTimerRef.current = setInterval(() => sendDrive(vx, omega), 120);
      }

      function endDrive() {
        setDrive({ vx: 0, omega: 0 });
        if (driveTimerRef.current) clearInterval(driveTimerRef.current);
        driveTimerRef.current = null;
        sendDrive(0, 0);
      }

      function onCanvasClick(e) {
        if (!sim) return;
        const rect = e.target.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * sim.map_size;
        const y = sim.map_size - ((e.clientY - rect.top) / rect.height) * sim.map_size;
        sendGoal(x, y);
      }

      async function sendMessage() {
        const text = message.trim();
        if (!text || streaming) return;
        setMessage("");
        setStreaming(true);
        let targetIndex = 0;
        setMessages((prev) => {
          targetIndex = prev.length + 1;
          return [...prev, { role: "user", text }, { role: "agent", text: "" }];
        });

        try {
          const url = "/chat/stream?message=" + encodeURIComponent(text) + "&session_id=" + encodeURIComponent(sessionId);
          const res = await fetch(url);
          if (!res.ok || !res.body) throw new Error("Stream unavailable");
          const reader = res.body.getReader();
          const dec = new TextDecoder();
          let buf = "";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += dec.decode(value, { stream: true });
            const chunks = buf.split("\n\n");
            buf = chunks.pop() || "";
            for (const chunk of chunks) {
              if (!chunk.startsWith("data: ")) continue;
              const payload = JSON.parse(chunk.slice(6));
              if (payload.kind === "text") {
                const textPart = typeof payload.data === "string" ? payload.data : "";
                setMessages((prev) => {
                  const out = [...prev];
                  if (!out[targetIndex]) return out;
                  out[targetIndex] = { ...out[targetIndex], text: (out[targetIndex].text || "") + textPart };
                  return out;
                });
              } else if (payload.kind === "tool_call") {
                const name = payload.data && payload.data.name ? payload.data.name : "tool";
                setMessages((prev) => [...prev, { role: "meta", text: `tool call: ${name}` }]);
              }
            }
          }
        } catch (err) {
          setMessages((prev) => [...prev, { role: "meta", text: "stream failed: " + String(err) }]);
        } finally {
          setStreaming(false);
        }
      }

      function useCommand(cmd) {
        setMessage(cmd.query);
        setShowPalette(false);
      }

      async function uploadPhysicsFile(ev) {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const isUniversalProfile =
            parsed &&
            typeof parsed === "object" &&
            parsed.profile_type === "robot_profile" &&
            parsed.profile &&
            typeof parsed.profile === "object";

          const endpoint = isUniversalProfile ? "/sim/profile/upload" : "/sim/physics/upload";
          const payload = isUniversalProfile
            ? parsed
            : { name: file.name, config: parsed };

          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.detail || "Upload failed");

          if (isUniversalProfile) {
            const profileName = body.profile || parsed.name || file.name;
            const sections = Array.isArray(body.sections) ? body.sections.join(", ") : "n/a";
            setPhysicsUploadStatus("Universal profile loaded: " + profileName + " | sections: " + sections);
            if (body.policy_loaded) {
              setPolicyUploadStatus("Policy loaded from universal profile");
            }
          } else {
            setPhysicsUploadStatus("Physics loaded: " + (body.profile || file.name));
          }
        } catch (err) {
          setPhysicsUploadStatus("Physics upload failed: " + String(err));
        }
      }

      async function uploadPolicyFile(ev) {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const config = JSON.parse(text);
          const res = await fetch("/sim/policy/upload", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: file.name, config })
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.detail || "Upload failed");
          setPolicyUploadStatus("Policy loaded: " + (body.policy || file.name));
        } catch (err) {
          setPolicyUploadStatus("Policy upload failed: " + String(err));
        }
      }

      async function runUploadedPolicy() {
        try {
          setPolicyRunStatus("Running policy...");
          const res = await fetch("/sim/policy/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ duration_s: 6.0 })
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.detail || "Run failed");
          setPolicyRunStatus("Policy run done: " + body.mode + " (" + body.duration_s + "s)");
        } catch (err) {
          setPolicyRunStatus("Policy run failed: " + String(err));
        }
      }

      return (
        <div className={"h-full flex flex-col" + (lightMode ? " light-mode" : "")}>
          <header className="panel m-3 mb-2 px-4 py-2.5 flex items-center gap-3">
            <div className="text-cyan-300 font-semibold">ROS2 Agent</div>
            <div className="text-xs text-gray-400">API: {status.status}</div>
            <div className="text-xs text-gray-400">Mock: {String(status.mock)}</div>
            <div className="text-xs text-gray-400">Provider: {status.provider}</div>
            <div className="ml-auto text-xs text-gray-500">
              nodes {rosStatus.node_count} | topics {rosStatus.topic_count} | battery {rosStatus.battery_pct}%
            </div>
            <button className="text-xs px-2 py-1 bg-slate-800 rounded" onClick={() => setShowInfo((v) => !v)}>Info</button>
            <button className="text-xs px-2 py-1 bg-slate-800 rounded" onClick={() => setShowEvents((v) => !v)}>Events</button>
            <button className="text-xs px-2 py-1 bg-slate-800 rounded" onClick={() => setShowPalette(true)}>Cmd</button>
            <button className="text-xs px-2 py-1 bg-slate-800 rounded" onClick={() => setLightMode((v) => !v)}>{lightMode ? "🌙 Dark" : "☀ Light"}</button>
          </header>

          <div className="flex-1 min-h-0 px-3 pb-3 flex gap-3">
            <section className="panel flex-1 min-w-0 flex flex-col">
              <div ref={scrollRef} className="flex-1 overflow-y-auto p-3 space-y-2 text-sm">
                {messages.map((m, i) => (
                  <div key={i} className={m.role === "user"
                    ? "bg-sky-950/40 border border-sky-900 rounded px-3 py-2"
                    : m.role === "meta"
                    ? "bg-emerald-950/30 border border-emerald-900 rounded px-3 py-2 text-emerald-300 text-xs"
                    : "bg-slate-900/50 border border-slate-800 rounded px-3 py-2"}>
                    <div className="text-xs opacity-70 mb-1">{m.role}</div>
                    <div className="whitespace-pre-wrap">{m.text || (streaming ? "..." : "")}</div>
                  </div>
                ))}
              </div>
              <div className="p-3 border-t border-slate-800 flex gap-2">
                <input
                  className="flex-1 bg-[#0d1117] border border-slate-700 rounded px-3 py-2 text-sm outline-none"
                  placeholder="Ask anything... (Ctrl+K quick commands)"
                  value={message}
                  onChange={(e) => setMessage(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) sendMessage(); }}
                />
                <button className="px-3 py-2 rounded bg-slate-700 hover:bg-slate-600 text-sm" onClick={clearChat}>Clear</button>
                <button className="px-4 py-2 rounded bg-cyan-700 hover:bg-cyan-600 text-sm disabled:opacity-50" disabled={streaming} onClick={sendMessage}>
                  {streaming ? "Streaming..." : "Send"}
                </button>
              </div>
            </section>

            <section className="panel w-[620px] flex-shrink-0 p-3 flex flex-col gap-2 min-h-0 overflow-y-auto">
              <div className="flex items-center justify-between">
                <div className="text-xs text-gray-400">Simulation (click map to set goal)</div>
                <div className="text-[11px] flex gap-1">
                  <button className={"px-2 py-1 rounded " + (viewMode === "3d" ? "bg-cyan-700" : "bg-slate-800")} onClick={() => setViewMode("3d")}>3D</button>
                  <button className={"px-2 py-1 rounded " + (viewMode === "2d" ? "bg-cyan-700" : "bg-slate-800")} onClick={() => setViewMode("2d")}>2D</button>
                  <button className={"px-2 py-1 rounded " + (cameraMode === "overview" ? "bg-cyan-700" : "bg-slate-800")} onClick={() => setCameraMode("overview")}>Overview</button>
                  <button className={"px-2 py-1 rounded " + (cameraMode === "follow" ? "bg-cyan-700" : "bg-slate-800")} onClick={() => setCameraMode("follow")}>Follow</button>
                  <button className={"px-2 py-1 rounded " + (showScan ? "bg-cyan-900" : "bg-slate-800")} onClick={() => setShowScan((v) => !v)}>Scan</button>
                  <button className={"px-2 py-1 rounded " + (showGrid ? "bg-cyan-900" : "bg-slate-800")} onClick={() => setShowGrid((v) => !v)}>Grid</button>
                  <button className={"px-2 py-1 rounded " + (showPath ? "bg-cyan-900" : "bg-slate-800")} onClick={() => setShowPath((v) => !v)}>Path</button>
                  <button className={"px-2 py-1 rounded " + (showOcc ? "bg-cyan-900" : "bg-slate-800")} onClick={() => setShowOcc((v) => !v)}>Map</button>
                </div>
              </div>
              {viewMode === "2d" ? (
                <canvas
                  ref={simCanvasRef}
                  width="468"
                  height="468"
                  className="w-full rounded border border-slate-800 bg-[#050b13] cursor-crosshair"
                  onClick={onCanvasClick}
                />
              ) : (
                <div className="relative">
                  <div ref={threeMountRef} className="w-full h-[560px] rounded border border-slate-800 overflow-hidden bg-[#050b13]" />
                  {cameraStatus && (
                    <div className="absolute top-2 left-2 text-[10px] text-amber-200 bg-amber-950/80 border border-amber-700 px-2 py-1 rounded">
                      {cameraStatus}
                    </div>
                  )}
                  <div className="absolute bottom-2 left-2 text-[10px] text-gray-300 bg-black/50 px-2 py-1 rounded">
                    PBR 3D view (drag orbit, wheel zoom, double-click reset)
                  </div>
                </div>
              )}
              <div className="grid grid-cols-4 gap-2 text-xs">
                <button className="px-2 py-2 rounded bg-slate-800 hover:bg-slate-700" onMouseDown={() => beginDrive(0.45, 0)} onMouseUp={endDrive} onMouseLeave={endDrive}>Forward</button>
                <button className="px-2 py-2 rounded bg-slate-800 hover:bg-slate-700" onMouseDown={() => beginDrive(0, 1.4)} onMouseUp={endDrive} onMouseLeave={endDrive}>Left</button>
                <button className="px-2 py-2 rounded bg-slate-800 hover:bg-slate-700" onMouseDown={() => beginDrive(0, -1.4)} onMouseUp={endDrive} onMouseLeave={endDrive}>Right</button>
                <button className="px-2 py-2 rounded bg-slate-800 hover:bg-slate-700" onMouseDown={() => beginDrive(-0.45, 0)} onMouseUp={endDrive} onMouseLeave={endDrive}>Reverse</button>
                <button className="px-2 py-2 rounded bg-red-900 hover:bg-red-800" onClick={endDrive}>Stop</button>
                <button className="px-2 py-2 rounded bg-slate-800 hover:bg-slate-700" onClick={resetSim}>Reset</button>
                <button className="px-2 py-2 rounded bg-slate-800 hover:bg-slate-700" onClick={() => sendGoal(5, 5)}>Center</button>
                <button className="px-2 py-2 rounded bg-slate-800 hover:bg-slate-700" onClick={sendPatrol}>Patrol</button>
              </div>
              <canvas ref={velCanvasRef} width="468" height="40" className="w-full rounded border border-slate-800" />
              <div className="text-xs text-gray-500 grid grid-cols-2 gap-1">
                <div>pose: {sim ? `${sim.x.toFixed(2)}, ${sim.y.toFixed(2)}` : "-"}</div>
                <div>heading: {sim ? `${((sim.theta * 180 / Math.PI + 360) % 360).toFixed(1)}deg` : "-"}</div>
                <div>nav: {sim ? (sim.nav_active ? "moving" : sim.nav_succeeded ? "arrived" : "idle") : "-"}</div>
                <div>drive: vx {drive.vx.toFixed(2)} | omega {drive.omega.toFixed(2)}</div>
              </div>
              <div className="mt-1 border border-slate-800 rounded p-2 text-xs bg-[#0d1117]">
                <div className="text-cyan-300 font-semibold mb-1">Model/Policy Upload</div>
                <div className="grid grid-cols-2 gap-2">
                  <label className="px-2 py-1 rounded bg-slate-800 hover:bg-slate-700 cursor-pointer text-center">
                    Upload Physics JSON
                    <input type="file" accept=".json,application/json" className="hidden" onChange={uploadPhysicsFile} />
                  </label>
                  <label className="px-2 py-1 rounded bg-slate-800 hover:bg-slate-700 cursor-pointer text-center">
                    Upload Policy JSON
                    <input type="file" accept=".json,application/json" className="hidden" onChange={uploadPolicyFile} />
                  </label>
                </div>
                <div className="mt-2 text-[11px] text-gray-400">{physicsUploadStatus || "Physics: waiting for upload"}</div>
                <div className="text-[11px] text-gray-400">{policyUploadStatus || "Policy: waiting for upload"}</div>
                <div className="mt-2 flex items-center gap-2">
                  <button className="px-2 py-1 rounded bg-cyan-800 hover:bg-cyan-700" onClick={runUploadedPolicy}>Run Uploaded Policy</button>
                  <span className="text-[11px] text-gray-400">{policyRunStatus || "No rollout yet"}</span>
                </div>
                <div className="mt-1 text-[10px] text-gray-500">
                  Policy JSON supports
                  {" "}
                  <code>{"{\"type\":\"cmd_vel_hold\",\"vx\":0.3,\"omega\":0.0}"}</code>
                  {" "}
                  or
                  {" "}
                  <code>{"{\"type\":\"waypoints\",\"waypoints\":[[1.5,1.5],[5,5]]}"}</code>.
                </div>
              </div>
            </section>

            {showEvents && (
              <aside className="panel w-64 p-2 overflow-y-auto text-xs">
                <div className="font-semibold text-yellow-300 mb-2">Event Log</div>
                <div className="space-y-1">
                  {events.slice().reverse().map((ev, i) => (
                    <div key={i} className="border-b border-slate-800 pb-1">
                      <div className="text-gray-500">{new Date((ev.ts || 0) * 1000).toLocaleTimeString()}</div>
                      <div className="text-gray-300">{ev.msg}</div>
                    </div>
                  ))}
                  {!events.length && <div className="text-gray-600">No events</div>}
                </div>
              </aside>
            )}

            {showInfo && (
              <aside className="panel w-72 p-2 overflow-y-auto text-xs">
                <div className="font-semibold text-cyan-300 mb-2">ROS 2 Info</div>
                <div className="mb-3">
                  <div className="text-gray-500 mb-1">Topics ({topics.length})</div>
                  <div className="space-y-0.5 max-h-24 overflow-y-auto">{topics.map((t, i) => <div key={i} className="text-gray-300 truncate">{t}</div>)}</div>
                </div>
                <div className="mb-3">
                  <div className="text-gray-500 mb-1">Nodes ({nodes.length})</div>
                  <div className="space-y-0.5 max-h-24 overflow-y-auto">{nodes.map((n, i) => <div key={i} className="text-gray-300 truncate">{n}</div>)}</div>
                </div>
                <div>
                  <div className="text-gray-500 mb-1">Services ({services.length})</div>
                  <div className="space-y-0.5 max-h-24 overflow-y-auto">{services.map((s, i) => <div key={i} className="text-gray-300 truncate">{s}</div>)}</div>
                </div>
              </aside>
            )}
          </div>

          {showPalette && (
            <div className="fixed inset-0 bg-black/60 flex items-start justify-center pt-24 z-40" onClick={() => setShowPalette(false)}>
              <div className="panel w-[520px] p-2" onClick={(e) => e.stopPropagation()}>
                <input
                  autoFocus
                  value={paletteQuery}
                  onChange={(e) => { setPaletteQuery(e.target.value); setPaletteIndex(0); }}
                  onKeyDown={(e) => {
                    if (e.key === "Escape") setShowPalette(false);
                    if (e.key === "ArrowDown") { e.preventDefault(); setPaletteIndex((v) => clamp(v + 1, 0, Math.max(0, filteredCommands.length - 1))); }
                    if (e.key === "ArrowUp") { e.preventDefault(); setPaletteIndex((v) => clamp(v - 1, 0, Math.max(0, filteredCommands.length - 1))); }
                    if (e.key === "Enter" && filteredCommands[paletteIndex]) useCommand(filteredCommands[paletteIndex]);
                  }}
                  className="w-full bg-[#0d1117] border border-slate-700 rounded px-3 py-2 text-sm outline-none"
                  placeholder="Type command name..."
                />
                <div className="mt-2 max-h-72 overflow-y-auto space-y-1">
                  {filteredCommands.map((c, i) => (
                    <button key={c.name} className={"w-full text-left px-3 py-2 rounded text-sm " + (i === paletteIndex ? "bg-cyan-900 text-cyan-100" : "bg-slate-900 text-gray-300")} onClick={() => useCommand(c)}>
                      {c.name}
                    </button>
                  ))}
                  {!filteredCommands.length && <div className="text-gray-500 text-sm px-2 py-4">No command match.</div>}
                </div>
              </div>
            </div>
          )}

          {showHelp && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-40" onClick={() => setShowHelp(false)}>
              <div className="panel w-[420px] p-4 text-sm" onClick={(e) => e.stopPropagation()}>
                <div className="text-cyan-300 font-semibold mb-2">Keyboard Shortcuts</div>
                <div className="space-y-1 text-gray-300">
                  <div>Ctrl+K - command palette</div>
                  <div>Ctrl+I - toggle info panel</div>
                  <div>Ctrl+L - toggle event panel</div>
                  <div>Ctrl+Shift+C - clear chat</div>
                  <div>Ctrl+Shift+R - reset simulation</div>
                  <div>W/A/S/D or arrows - drive</div>
                  <div>Space - stop</div>
                  <div>? - toggle this help</div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
